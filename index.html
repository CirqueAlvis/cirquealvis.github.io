<!DOCTYPE html>
    <html lang="en">
        <head>
            <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <link rel="shortcut icon" type="image/x-icon" href="img/favicon.ico">
                <title id="webTitle">CQAS – Home</title>
        </head>
        <style>
            @font-face {
                font-family: "Unbounded";
                src: url("./fonts/unbounded-vf.ttf");
                font-weight: 800;
                text-shadow: 4px, 4px, 6px, rgba(0,0,0,255);
            }
            @font-face {
                font-family: "SUSE";
                src: url("./fonts/suse-vf.ttf");
                font-weight: 600;
            }
            @font-face {
                font-family: "Jura";
                src: url("./fonts/jura-vf.ttf");
            }

            :root {
                --header-font: "Unbounded";
                --text-font: "SUSE";
                --subtitle-font: "Jura";
                --neumorphic-shadow: 0.13vh 0.13vh 0.5vh rgba(255,255,255,255), -0.13vh -0.13vh 0.5vh rgba(0,0,0,255);

                --buttonContainerWidthWide: 50%;
                --buttonContainerHeightWide: 80px;
                --buttonContainerWidthPor: 150px;
                --buttonContainerHeightPor: 84px;
                --font-sizeWide: 2.5vw;
                --font-sizePor: 5vw;
                --button-imgHeight: 194px;

                /* Glass Distort Filter */
                --glass-innerSpec-color: #ffffffff;
                --glass-outerSpec-color: #ffffff33;
                --glass-specular-shadow: inset 0.125vw 0.125vh 0.25vw var(--glass-innerSpec-color), inset 0 0 64px var(--glass-outerSpec-color);
                --glass-button-color: linear-gradient(0deg, #faf0d094 8%,#121c2094 40%, #121c2094 55%, #ffffffbb 93%);
                --glass-button-borderRadius: 6px;
                --glass-panel-color: #7ac8ff21;
                --glass-filter: brightness(1.3) blur(0.25vh) saturate(125%);
            }

            body{
                margin: 0;
                width: 100vw;
                height: 100vh;
                overflow: hidden;
                position: absolute;
                user-select: none;

                color: white;
                text-shadow: var(--neumorphic-shadow);
                background-image: url(img/placeholderBG.png);
                background-size: cover;
                background-repeat: no-repeat;
                background-attachment: fixed;
                background-position: center;
                background-blend-mode: hard-light;
            }

            ul{
                list-style-type: none;
                padding: 0;
            }

            .foreground {
                display: flex;
                flex-direction: row;
                justify-content: center;
                align-items: center;
                text-align: center;
                width: inherit;
                height: inherit;
                text-align: center;
            }

            .leftPanel{
                width: 100%;
            }

            .leftPanelContents{
                width: 100%;
            }
            
            .webHead{
                text-align: end;
                font-family: var(--header-font);
                font-size: 8vh;
                
            }

            .rightPanel{
                display: inherit;
                flex-direction: inherit;
                justify-content: inherit;
                align-items: inherit;
                text-align: inherit;
                width: 100%;
            }

            .page{
                flex-direction: column;
            }

            .list{
                flex-shrink: 0;
                flex-direction: row;
                overflow-x: scroll;
                overflow-y: hidden;
                white-space: nowrap;
                width: 50vh;
            }

            #gameList{
                width: 42.3vh;
            }

            #modList{
                all: unset;
                display: flex;
                flex-direction: column;
            }

            .button{
                /* Unset Button Style */
                all: unset;
                background: none;
                border: none;
                padding: 0;

                /* New Button Style */
                background: var(--glass-button-color);
                box-shadow: var(--glass-specular-shadow);
                border-radius: var(--glass-button-borderRadius);
                backdrop-filter: var(--glass-filter);
                -webkit-backdrop-filter: var(--glass-filter);

                width: 40vh;
                height: 8vh;
                margin: 1vh;
                font-family: var(--text-font);
                font-size: 3vh;
            }

            #tabs{
                width: 20vh;
                height: 6vh;
            }

            #homeButton{
                width: 20vh;
            }

            .button:hover{
                filter: brightness(125%);
            }
            
            .button:active{
                filter: saturate(500%);
            }

            @media (max-aspect-ratio: 4/3){
                .foreground {
                    flex-direction: column;
                }

                .webHead{
                    font-size: 6vh;
                }

                .webHead{
                    text-align: center;
                }

                #mods{
                    flex-direction: column-reverse;
                }
            }
        </style>

        <div class="bgOverlay"></div>

        <div class="foreground">
            <div class="leftPanel">
                <ul class="leftPanelContents">
                    <li class="webHead" id="webHead"> <!--no head? °^°-->
                        <p>Cirque Alvis</p>
                    </li>
                </ul>
            </div>

        <body>
            <div class="rightPanel">
                <div class="page" id="home">
                        <button class="button" onclick="window.open('https://twitch.tv/cirquealvis')">Twitch</button>
                        <button class="button" onclick="window.open('https://youtube.com/cirquealvis')">YouTube</button>
                        <button class="button" onclick="window.open('https://x.com/cirquealvis')">Twitter</button>
                        <button class="button" onclick="window.open('https://steamcommunity.com/id/cirquealvis/')">Steam</button>
                        <!-- <button class="button" onclick="location.href='#mods'">Mods Used</button>-->
                </div>

                <div class="page" id="mods">
                    <button class="button" id="homeButton" onclick="location.href='#home'">Home</button>
                    <div class="list" id="gameList">
                        <button class="button" id="tabs">Minecraft</button>
                        <button class="button" id="tabs">Garry's Mod</button>
                        <button class="button" id="tabs">Minecraft</button>
                        <button class="button" id="tabs">Garry's Mod</button>
                        <button class="button" id="tabs">Minecraft</button>
                        <button class="button" id="tabs">Garry's Mod</button>
                        <button class="button" id="tabs">Minecraft</button>
                        <button class="button" id="tabs">Garry's Mod</button>
                    </div>
                    <div class="list" id="modList">
                        <button class="button">Test</button>
                        <button class="button">Test</button>
                    </div>
                </div>
            </div>
        </body>

        <script>
            onhashchange = onload = () => {
                const targetId = location.hash || '#home';
                document.querySelectorAll('.page').forEach(el => {
                el.style.display = (el.id === targetId.slice(1)) ? 'flex' : 'none';
                });
            }
        </script>

    </html>
